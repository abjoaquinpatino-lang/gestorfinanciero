<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestor Financiero</title>
  
  <!-- Firebase SDKs (Versión compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

  <style>
    :root {
      --primary: #2563eb;
      --bg: #f1f5f9;
      --card-bg: #ffffff;
      --text: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --success: #10b981;
      --danger: #ef4444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 1rem;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
    }

    .card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      border: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }

    .hidden { display: none !important; }

    /* Headers & Text */
    h2 { font-size: 1.4rem; margin-bottom: 0.5rem; font-weight: 700; }
    h3 { font-size: 1.1rem; margin-bottom: 1rem; font-weight: 600; }
    
    .header-user {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    /* Forms & Inputs */
    .form-group { margin-bottom: 1rem; }
    label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--text-muted); }
    input, select {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 1rem;
      background: #f8fafc;
      outline: none;
    }
    input:focus, select:focus { border-color: var(--primary); background: #fff; }

    /* Buttons */
    .btn {
      width: 100%;
      padding: 0.8rem;
      background-color: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:active { opacity: 0.9; }
    .btn-secondary {
      background-color: transparent;
      color: var(--danger);
      border: 1px solid var(--danger);
      padding: 0.4rem 0.8rem;
      font-size: 0.85rem;
      width: auto;
    }

    /* Dashboard Widgets */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      text-align: center;
    }
    .summary-card {
      background: #f8fafc;
      padding: 0.8rem 0.4rem;
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    .summary-card span { font-size: 0.75rem; color: var(--text-muted); display: block; }
    .summary-card strong { font-size: 0.95rem; display: block; margin-top: 0.2rem; }
    .text-success { color: var(--success); }
    .text-danger { color: var(--danger); }

    /* Transaction List */
    .item-list { list-style: none; }
    .item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.8rem 0;
      border-bottom: 1px solid var(--border);
    }
    .item:last-child { border-bottom: none; }
    .item-info p { font-weight: 600; font-size: 0.95rem; }
    .item-info small { color: var(--text-muted); font-size: 0.75rem; }
    .item-amount { text-align: right; }
    .delete-btn {
      background: none;
      border: none;
      color: #94a3b8;
      cursor: pointer;
      font-size: 1.1rem;
      margin-left: 0.5rem;
    }
    .delete-btn:hover { color: var(--danger); }
    
    .error-msg {
      color: var(--danger);
      font-size: 0.85rem;
      margin-top: 0.5rem;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- 1. PANTALLA DE LOGIN -->
    <div id="login-screen" class="card">
      <h2>🔒 Acceso Privado</h2>
      <p style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 1.5rem;">Ingresá tus credenciales para administrar los gastos.</p>
      
      <form id="login-form">
        <div class="form-group">
          <label for="email">Correo Electrónico</label>
          <input type="email" id="email" placeholder="ejemplo@mail.com" required>
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn">Iniciar Sesión</button>
        <div id="login-error" class="error-msg hidden"></div>
      </form>
    </div>

    <!-- 2. PANTALLA PRINCIPAL (Oculta hasta iniciar sesión) -->
    <div id="app-screen" class="hidden">
      
      <!-- User Header -->
      <div class="card header-user" style="padding: 1rem 1.5rem; margin-bottom: 1rem;">
        <div>
          <span style="font-size: 0.75rem; color: var(--text-muted);">Sesión iniciada:</span>
          <p id="user-email-display" style="font-weight: 600; font-size: 0.85rem;"></p>
        </div>
        <button id="logout-btn" class="btn btn-secondary">Salir</button>
      </div>

      <!-- Resumen Financiero -->
      <div class="summary-grid">
        <div class="summary-card">
          <span>Ingresos</span>
          <strong id="total-ingresos" class="text-success">$0</strong>
        </div>
        <div class="summary-card">
          <span>Gastos</span>
          <strong id="total-gastos" class="text-danger">$0</strong>
        </div>
        <div class="summary-card">
          <span>Balance</span>
          <strong id="total-balance">$0</strong>
        </div>
      </div>

      <!-- Formulario para Cargar Movimientos -->
      <div class="card">
        <h3>➕ Nuevo Movimiento</h3>
        <form id="transaction-form">
          <div class="form-group">
            <label for="concepto">Descripción / Concepto</label>
            <input type="text" id="concepto" placeholder="Ej: Supermercado, Sueldo" required>
          </div>
          
          <div style="display: flex; gap: 0.5rem;">
            <div class="form-group" style="flex: 1;">
              <label for="monto">Monto ($)</label>
              <input type="number" id="monto" step="0.01" placeholder="0.00" required>
            </div>
            <div class="form-group" style="flex: 1;">
              <label for="tipo">Tipo</label>
              <select id="tipo">
                <option value="gasto">Gasto</option>
                <option value="ingreso">Ingreso</option>
              </select>
            </div>
          </div>

          <button type="submit" class="btn">Guardar Movimiento</button>
        </form>
      </div>

      <!-- Historial de Movimientos -->
      <div class="card">
        <h3>📋 Historial de Movimientos</h3>
        <ul id="item-list" class="item-list">
          <li style="text-align: center; color: var(--text-muted); font-size: 0.85rem;">Cargando datos...</li>
        </ul>
      </div>

    </div>

  </div>

  <script>
    // ===================================================
    // ⚙️ 1. CONFIGURACIÓN DE FIREBASE (PEGA TUS CLAVES AQUÍ)
    // ===================================================
    const firebaseConfig = {
      apiKey: "AIzaSyBG0IB0j3GFn4yRkAyGhHggJkLlh68TIfc",
      authDomain: "gestor-financiero-cf65c.firebaseapp.com",
      databaseURL: "https://gestor-financiero-cf65c-default-rtdb.firebaseio.com",
      projectId: "gestor-financiero-cf65c",
      storageBucket: "gestor-financiero-cf65c.firebasestorage.app",
      messagingSenderId: "46576248217",
      appId: "1:46576248217:web:8ba30eabb61c8ab67d1f08"
    };

    // Inicialización de Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // Elementos del DOM
    const loginScreen = document.getElementById('login-screen');
    const appScreen = document.getElementById('app-screen');
    const loginForm = document.getElementById('login-form');
    const loginError = document.getElementById('login-error');
    const logoutBtn = document.getElementById('logout-btn');
    const userEmailDisplay = document.getElementById('user-email-display');
    
    const transactionForm = document.getElementById('transaction-form');
    const itemList = document.getElementById('item-list');
    const totalIngresosEl = document.getElementById('total-ingresos');
    const totalGastosEl = document.getElementById('total-gastos');
    const totalBalanceEl = document.getElementById('total-balance');

    // ===================================================
    // 🔐 2. AUTENTICACIÓN
    // ===================================================
    auth.onAuthStateChanged((user) => {
      if (user) {
        loginScreen.classList.add('hidden');
        appScreen.classList.remove('hidden');
        userEmailDisplay.textContent = user.email;
        escucharMovimientos(); // Conectar DB cuando hay usuario
      } else {
        loginScreen.classList.remove('hidden');
        appScreen.classList.add('hidden');
      }
    });

    // Iniciar Sesión
    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      loginError.classList.add('hidden');
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      auth.signInWithEmailAndPassword(email, password)
        .catch((error) => {
          loginError.textContent = "Error: Email o contraseña incorrectos.";
          loginError.classList.remove('hidden');
        });
    });

    // Cerrar Sesión
    logoutBtn.addEventListener('click', () => {
      auth.signOut();
    });

    // ===================================================
    // 💾 3. BASE DE DATOS Y LÓGICA DE MOVIMIENTOS
    // ===================================================

    // Guardar nuevo movimiento
    transactionForm.addEventListener('submit', (e) => {
      e.preventDefault();

      const concepto = document.getElementById('concepto').value;
      const monto = parseFloat(document.getElementById('monto').value);
      const tipo = document.getElementById('tipo').value;
      const fecha = new Date().toLocaleDateString('es-AR');

      const nuevoMovimiento = {
        concepto,
        monto,
        tipo,
        fecha,
        usuario: auth.currentUser.email,
        timestamp: firebase.database.ServerValue.TIMESTAMP
      };

      // Guardar en la rama 'libroMayor_v2' (protegida por tus reglas)
      db.ref('libroMayor_v2').push(nuevoMovimiento)
        .then(() => {
          transactionForm.reset();
        })
        .catch((err) => {
          alert("Error al guardar: Verificá tus permisos de Firebase.");
        });
    });

    // Leer movimientos en tiempo real
    function escucharMovimientos() {
      db.ref('libroMayor_v2').orderByChild('timestamp').on('value', (snapshot) => {
        itemList.innerHTML = '';
        let totalIngresos = 0;
        let totalGastos = 0;

        if (!snapshot.exists()) {
          itemList.innerHTML = '<li style="text-align: center; color: var(--text-muted); font-size: 0.85rem;">No hay movimientos registrados.</li>';
          actualizarResumen(0, 0);
          return;
        }

        snapshot.forEach((childSnapshot) => {
          const key = childSnapshot.key;
          const item = childSnapshot.val();

          // Sumar Totales
          if (item.tipo === 'ingreso') {
            totalIngresos += item.monto;
          } else {
            totalGastos += item.monto;
          }

          // Renderizar Elemento
          const li = document.createElement('li');
          li.className = 'item';
          const esIngreso = item.tipo === 'ingreso';

          li.innerHTML = `
            <div class="item-info">
              <p>${item.concepto}</p>
              <small>${item.fecha} • ${item.usuario.split('@')[0]}</small>
            </div>
            <div class="item-amount">
              <span class="${esIngreso ? 'text-success' : 'text-danger'}" style="font-weight: 700;">
                ${esIngreso ? '+' : '-'}$${item.monto.toLocaleString('es-AR')}
              </span>
              <button class="delete-btn" onclick="eliminarMovimiento('${key}')">✕</button>
            </div>
          `;

          // Insertar al inicio de la lista para ver lo más reciente arriba
          itemList.insertBefore(li, itemList.firstChild);
        });

        actualizarResumen(totalIngresos, totalGastos);
      });
    }

    // Eliminar movimiento
    window.eliminarMovimiento = function(id) {
      if (confirm("¿Querés borrar este movimiento?")) {
        db.ref(`libroMayor_v2/${id}`).remove();
      }
    };

    // Actualizar Widgets superiores
    function actualizarResumen(ingresos, gastos) {
      const balance = ingresos - gastos;
      totalIngresosEl.textContent = `$${ingresos.toLocaleString('es-AR')}`;
      totalGastosEl.textContent = `$${gastos.toLocaleString('es-AR')}`;
      totalBalanceEl.textContent = `$${balance.toLocaleString('es-AR')}`;

      if (balance < 0) {
        totalBalanceEl.className = 'text-danger';
      } else {
        totalBalanceEl.className = 'text-success';
      }
    }
  </script>
</body>
</html>
